<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — FoodShare</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo">🌱 FoodShare</a>
    <div class="nav-links">
      <span>Hello, <strong id="userName"></strong> (<span id="userRole"></span>)</span>
      <span id="notifBadge" class="badge badge-priority hidden">0</span>
      <button id="logoutBtn" class="btn btn-outline btn-sm">Logout</button>
    </div>
  </nav>

  <div class="container">
    <div class="dashboard-header">
      <h1>Dashboard</h1>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="value" id="statTotal">0</div>
        <div class="label">Total Listings</div>
      </div>
      <div class="stat-card">
        <div class="value" id="statPickedUp">0</div>
        <div class="label">Meals Redistributed</div>
      </div>
      <div class="stat-card">
        <div class="value" id="statAvailable">0</div>
        <div class="label">Available Now</div>
      </div>
      <div class="stat-card">
        <div class="value" id="statImpact">0</div>
        <div class="label">Impact Score</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:2rem;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
        <h2>Notifications</h2>
        <button id="markAllReadBtn" class="btn btn-outline btn-sm">Mark All Read</button>
      </div>
      <div id="notificationList" class="notification-list"></div>
    </div>

    <!-- Restaurant Panel -->
    <div id="restaurantPanel" class="hidden">
      <div class="tabs">
        <button class="tab active" data-tab="postFood">Post Food</button>
        <button class="tab" data-tab="myListingsTab">My Listings</button>
      </div>

      <div id="postFood" class="tab-content active">
        <div class="card">
          <h2>Post Surplus Food</h2>
          <div id="createAlert"></div>
          <form id="createListingForm">
            <div class="form-group">
              <label for="title">Food Title</label>
              <input type="text" id="title" name="title" required placeholder="e.g. Fresh vegetable biryani">
            </div>
            <div class="form-group">
              <label for="description">Description</label>
              <textarea id="description" name="description" placeholder="Details about the food, dietary info, etc."></textarea>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
              <div class="form-group">
                <label for="quantity">Quantity</label>
                <input type="text" id="quantity" name="quantity" required placeholder="e.g. 50">
              </div>
              <div class="form-group">
                <label for="unit">Unit</label>
                <select id="unit" name="unit">
                  <option value="servings">Servings</option>
                  <option value="kg">Kilograms</option>
                  <option value="boxes">Boxes</option>
                  <option value="plates">Plates</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label for="expiryTime">Must be picked up before</label>
              <input type="datetime-local" id="expiryTime" name="expiryTime" required>
            </div>
            <div class="form-group">
              <label for="pickupAddress">Pickup Address</label>
              <input type="text" id="pickupAddress" name="pickupAddress" required placeholder="Restaurant address">
            </div>
            <div id="aiPreview" class="hidden"></div>
            <button type="submit" class="btn btn-primary">Post Food & Notify NGOs</button>
          </form>
        </div>
      </div>

      <div id="myListingsTab" class="tab-content">
        <h2>My Listings</h2>
        <div id="myListings" class="card-grid"></div>
      </div>
    </div>

    <!-- NGO / Volunteer Panel -->
    <div id="receiverPanel" class="hidden">
      <div class="tabs">
        <button class="tab active" data-tab="availableTab">Available Food</button>
        <button class="tab" data-tab="claimsTab">My Claims</button>
        <button class="tab" data-tab="aiTab">AI Recommendations</button>
      </div>

      <div id="availableTab" class="tab-content active">
        <h2>Available Food Near You</h2>
        <div id="availableFood" class="card-grid"></div>
      </div>

      <div id="claimsTab" class="tab-content">
        <h2>My Claims</h2>
        <div id="myClaims" class="card-grid"></div>
      </div>

      <div id="aiTab" class="tab-content">
        <h2>AI-Powered Recommendations</h2>
        <p class="meta" style="margin-bottom:1rem;">Prioritized by expiry time, food type, and urgency.</p>
        <div id="recommendations" class="card-grid"></div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
