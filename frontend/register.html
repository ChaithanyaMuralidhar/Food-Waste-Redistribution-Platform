<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — FoodShare</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo">🌱 FoodShare</a>
    <div class="nav-links">
      <a href="login.html">Login</a>
    </div>
  </nav>

  <div class="container">
    <div class="form-container card">
      <h2 style="text-align:center;margin-bottom:1.5rem;">Create Account</h2>
      <div id="alertBox"></div>
      <form id="registerForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" required placeholder="John Doe">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required minlength="6" placeholder="Min 6 characters">
        </div>
        <div class="form-group">
          <label for="role">I am a...</label>
          <select id="role" name="role" required>
            <option value="">Select role</option>
            <option value="restaurant">Restaurant / Food Business</option>
            <option value="ngo">NGO / Charity</option>
            <option value="volunteer">Volunteer</option>
          </select>
        </div>
        <div class="form-group">
          <label for="organization">Organization Name</label>
          <input type="text" id="organization" name="organization" placeholder="Your organization">
        </div>
        <div class="form-group">
          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone" placeholder="+1 234 567 8900">
        </div>
        <div class="form-group">
          <label for="address">Address</label>
          <input type="text" id="address" name="address" placeholder="City, area">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Create Account</button>
      </form>
      <p style="text-align:center;margin-top:1rem;">
        Already have an account? <a href="login.html">Login here</a>
      </p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
